name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Keep disabled until owner handoff is complete.
    if: ${{ vars.ENABLE_GH_PAGES_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Validate production appointment endpoint
        env:
          NEXT_PUBLIC_APPOINTMENT_ENDPOINT: ${{ vars.NEXT_PUBLIC_APPOINTMENT_ENDPOINT }}
        run: |
          if [ -z "${NEXT_PUBLIC_APPOINTMENT_ENDPOINT}" ]; then
            echo "Repository variable NEXT_PUBLIC_APPOINTMENT_ENDPOINT is required for production appointment delivery."
            exit 1
          fi
          if [[ "${NEXT_PUBLIC_APPOINTMENT_ENDPOINT}" != https://* ]]; then
            echo "NEXT_PUBLIC_APPOINTMENT_ENDPOINT must use https in production."
            exit 1
          fi

      - name: Build static export
        run: npm run build:pages
        env:
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NEXT_PUBLIC_APPOINTMENT_ENDPOINT: ${{ vars.NEXT_PUBLIC_APPOINTMENT_ENDPOINT }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    if: ${{ vars.ENABLE_GH_PAGES_DEPLOY == 'true' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
